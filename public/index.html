<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三金基金助手</title>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1419;
    color: #e1e8ed;
    min-height: 100vh;
    padding: 20px;
  }
  a { color: #1d9bf0; text-decoration: none; }

  /* ─── Layout ─── */
  .container { max-width: 1100px; margin: 0 auto; }

  /* ─── Header ─── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
  }
  .header h1 { font-size: 24px; font-weight: 700; }
  .header h1 span { color: #f7931a; }
  .header-right { display: flex; align-items: center; gap: 12px; font-size: 13px; color: #8899a6; }

  /* ─── Status Bar ─── */
  .status-bar {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px; background: #1a2533; border-radius: 10px;
    margin-bottom: 20px; font-size: 13px; flex-wrap: wrap;
    contain: layout style;
    backface-visibility: hidden;
  }
  .status-dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    margin-right: 4px; animation: pulse 2s infinite;
    will-change: opacity, background-color;
    transition: opacity 0.15s ease;
  }
  .status-dot.on { background: #00ba7c; }
  .status-dot.off { background: #ff4444; animation: none; }
  .status-dot.loading { background: #f7931a; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-refresh { color: #8899a6; }
  .status-count { color: #8899a6; }

  /* ─── Add Fund Form ─── */
  .add-form {
    background: #1a2533; border-radius: 12px; padding: 20px;
    margin-bottom: 20px;
  }
  .add-form h2 { font-size: 16px; margin-bottom: 14px; color: #f7931a; }
  .form-row {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .form-group {
    display: flex; flex-direction: column; gap: 4px;
  }
  .form-group label {
    font-size: 12px; color: #8899a6; font-weight: 500;
  }
  .form-group input {
    padding: 8px 12px; border: 1px solid #2f3e4e; border-radius: 8px;
    background: #0f1419; color: #e1e8ed; font-size: 14px;
    outline: none; transition: border-color 0.2s;
    width: 100%;
  }
  .form-group input:focus { border-color: #f7931a; }
  .form-group input::placeholder { color: #5c6e7e; }
  .form-group.code { width: 110px; }
  .form-group.price { width: 120px; }
  .form-group.shares { width: 130px; }
  .form-group.cost { width: 130px; }

  .input-hint { font-size: 11px; color: #5c6e7e; margin-top: 2px; }

  .btn {
    padding: 8px 20px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn-primary {
    background: #f7931a; color: #0f1419;
  }
  .btn-primary:hover { background: #e08310; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-secondary {
    background: #2f3e4e; color: #e1e8ed;
  }
  .btn-secondary:hover { background: #3d5063; }

  .btn-danger {
    background: transparent; color: #ff6b6b; border: 1px solid #ff6b6b33;
    padding: 4px 12px; font-size: 12px;
  }
  .btn-danger:hover { background: #ff6b6b22; }

  .btn-sm { padding: 6px 14px; font-size: 13px; }

  .input-mode-toggle {
    font-size: 12px; color: #8899a6; cursor: pointer; user-select: none;
    border-bottom: 1px dashed #2f3e4e; margin-left: 4px;
  }
  .input-mode-toggle:hover { color: #f7931a; }

  /* ─── Total Summary Card ─── */
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 20px;
  }
  .summary-item {
    background: #1a2533; border-radius: 12px; padding: 16px 20px;
    text-align: center;
  }
  .summary-item .label { font-size: 12px; color: #8899a6; margin-bottom: 6px; }
  .summary-item .value { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .summary-item .value.positive { color: #ff4444; }
  .summary-item .value.negative { color: #00ba7c; }
  .summary-item .value.neutral { color: #e1e8ed; }
  .summary-item .sub { font-size: 13px; color: #8899a6; margin-top: 2px; }

  /* ─── Table ─── */
  .table-wrap {
    background: #1a2533; border-radius: 12px; overflow: hidden;
    margin-bottom: 20px;
  }
  .table-wrap .empty-msg {
    padding: 40px 20px; text-align: center; color: #5c6e7e;
  }
  .table-wrap .empty-msg .big-icon { font-size: 48px; margin-bottom: 12px; }
  .table-wrap .empty-msg p { font-size: 14px; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: right; padding: 12px 10px; font-size: 12px; color: #8899a6;
    font-weight: 600; border-bottom: 1px solid #2f3e4e;
    white-space: nowrap;
  }
  thead th:first-child { text-align: left; padding-left: 20px; }
  thead th:last-child { padding-right: 20px; text-align: center; }

  tbody td {
    text-align: right; padding: 12px 10px; font-size: 14px;
    border-bottom: 1px solid #1e2d3d;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  tbody td:first-child { text-align: left; padding-left: 20px; }
  tbody td:last-child { text-align: center; padding-right: 20px; }
  tbody tr:hover { background: #1e2d3d; }
  tbody tr:last-child td { border-bottom: none; }

  .code-tag {
    font-family: "SF Mono", "Menlo", monospace;
    background: #0f1419; padding: 2px 8px; border-radius: 4px;
    font-size: 13px; color: #f7931a;
  }
  .name-cell { max-width: 180px; overflow: hidden; text-overflow: ellipsis; }
  .num { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
  .positive { color: #ff4444; }
  .negative { color: #00ba7c; }

  .remove-btn {
    background: none; border: none; cursor: pointer; font-size: 16px;
    color: #5c6e7e; transition: color 0.2s; padding: 2px 6px;
  }
  .remove-btn:hover { color: #ff4444; }

  /* ─── Bottom Controls ─── */
  .controls {
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 12px 0;
  }
  .controls label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #8899a6; cursor: pointer;
  }
  .controls input[type="checkbox"] {
    accent-color: #f7931a; width: 16px; height: 16px;
  }
  .controls .last-update { font-size: 12px; color: #5c6e7e; margin-left: auto; }

  /* ─── Responsive ─── */
  @media (max-width: 768px) {
    body { padding: 12px; }
    .header h1 { font-size: 20px; }
    .form-row { flex-direction: column; align-items: stretch; }
    .form-group { width: 100% !important; }
    .form-group input { width: 100%; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary-item { padding: 12px; }
    .summary-item .value { font-size: 18px; }

    table { font-size: 13px; }
    thead th, tbody td { padding: 8px 6px; }
    thead th:first-child, tbody td:first-child { padding-left: 10px; }
    thead th:last-child, tbody td:last-child { padding-right: 10px; }
    .name-cell { max-width: 80px; }
  }
  @media (max-width: 480px) {
    .summary { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .summary-item { padding: 10px 8px; }
    .summary-item .value { font-size: 16px; }
  }

  /* ─── Page Switching ─── */
  .page-main { display: block; }
  .page-main.hidden { display: none; }
  .page-add { display: none; }
  .page-add.active { display: block; }

  /* ─── FAB (Floating Add Button) ─── */
  .fab {
    position: fixed; bottom: 24px; right: 24px;
    width: 56px; height: 56px; border-radius: 50%;
    background: #f7931a; color: #0f1419;
    font-size: 30px; font-weight: 700; border: none;
    cursor: pointer; z-index: 100;
    box-shadow: 0 4px 16px rgba(247,147,26,0.4);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    user-select: none;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(247,147,26,0.6); }
  .fab:active { transform: scale(0.95); }
  .fab.hidden { display: none; }

  /* ─── Back Button ─── */
  .back-btn {
    background: none; border: none; color: #8899a6;
    font-size: 15px; cursor: pointer; padding: 8px 0;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px;
  }
  .back-btn:hover { color: #e1e8ed; }

  /* ─── Table Horizontal Scroll ─── */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .table-wrap table { min-width: 720px; }

  @media (max-width: 768px) {
    .fab { bottom: 16px; right: 16px; width: 48px; height: 48px; font-size: 24px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- ═══ Main View ═══ -->
  <div class="page-main" id="pageMain">

  <!-- ═══ Header ═══ -->
  <div class="header">
    <h1><span>三金</span>基金助手</h1>
    <div class="header-right">
      <span id="fundCount">0 只基金</span>
      <button class="btn btn-secondary btn-sm" id="addFundBtn" style="margin-left:8px;">＋ 添加</button>
    </div>
  </div>

  <!-- ═══ Status ═══ -->
  <div class="status-bar">
    <span><span class="status-dot" id="statusDot"></span> <span id="statusText">就绪</span></span>
    <span class="status-refresh" id="refreshInfo">⏱ 数据刷新中…</span>
    <span class="status-count">📈 <span id="totalFunds">0</span> 只跟踪中</span>
  </div>

  </div><!-- /page-main -->

  <!-- ═══ Add Fund Page ═══ -->
  <div class="page-add" id="pageAdd">

    <button class="back-btn" id="backBtn">‹ 返回持仓</button>

    <div class="add-form" style="margin-top:0;">
      <h2 style="margin-bottom:12px;">➕ 添加基金</h2>
      <div class="form-row">
        <div class="form-group code">
          <label for="fundCode">基金代码</label>
          <input type="text" id="fundCode" placeholder="如 159625" maxlength="6" autocomplete="off">
        </div>
        <div class="form-group price">
          <label for="costPrice">成本单价 (元)</label>
          <input type="text" id="costPrice" placeholder="0.000" autocomplete="off">
        </div>
        <div class="form-group shares">
          <label for="shares">持有份额</label>
          <input type="text" id="shares" placeholder="1000" autocomplete="off">
        </div>
        <div class="form-group" style="align-self:flex-end;">
          <button class="btn btn-primary" id="addBtn">添加</button>
        </div>
      </div>
      <div class="form-row" style="margin-top:6px;">
        <span class="input-hint">💡 也支持输入总金额自动计算：先填「份额」再点「<span style="color:#f7931a;cursor:pointer;" id="costHintToggle">切换到总金额输入</span>」</span>
      </div>
    </div>

  </div><!-- /page-add -->

  <!-- ═══ Total Summary ═══ -->
  <div class="summary" id="summaryArea">
    <div class="summary-item">
      <div class="label">💰 总投入</div>
      <div class="value neutral" id="totalCost">¥0.00</div>
    </div>
    <div class="summary-item">
      <div class="label">📈 总市值</div>
      <div class="value neutral" id="totalValue">¥0.00</div>
    </div>
    <div class="summary-item">
      <div class="label">📊 总盈亏</div>
      <div class="value neutral" id="totalProfit">¥0.00</div>
      <div class="sub" id="totalProfitPercent">—</div>
    </div>
    <div class="summary-item">
      <div class="label">🏆 今日总收益</div>
      <div class="value neutral" id="totalDayProfit">¥0.00</div>
      <div class="sub" id="totalDayPercent">—</div>
    </div>
  </div>

  <!-- ═══ Portfolio Table ═══ -->
  <div class="table-wrap" id="tableWrap">
    <div class="empty-msg" id="emptyMsg">
      <div class="big-icon">📋</div>
      <p>还没有添加基金</p>
      <p style="font-size:12px;margin-top:8px;">点击右上角「＋ 添加」或右下角橙色按钮添加基金</p>
    </div>
    <table id="fundTable" style="display:none;">
      <thead>
        <tr>
          <th>基金</th>
          <th>成本单价</th>
          <th>份额</th>
          <th>成本总额</th>
          <th>当前价</th>
          <th>今日涨幅</th>
          <th>盈亏金额</th>
          <th>盈亏比例</th>
          <th>今日收益</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="fundList"></tbody>
    </table>
  </div>

  <!-- ═══ Controls ═══ -->
  <div class="controls">
    <label>
      <input type="checkbox" id="autoRefresh" checked>
      自动刷新 (5秒)
    </label>
    <button class="btn btn-secondary btn-sm" id="refreshBtn">⟳ 立即刷新</button>
    <button class="btn btn-secondary btn-sm" id="clearAllBtn">🗑 清空所有</button>
    <span class="last-update" id="lastUpdate">—</span>
  </div>

</div><!-- /container -->

<!-- ═══ Floating Add Button ═══ -->
<button class="fab" id="fabBtn">＋</button>

<script>
// ══════════════════════════════════════════════════
//  State
// ══════════════════════════════════════════════════

const STORAGE_KEY = 'fund_portfolio_v1';

let portfolio = [];     // [{ id, code, costPrice, shares, totalCost }]
let quotes = {};        // { [code]: { name, price, prevClose, changePercent, time } }
let refreshTimer = null;
let isRefreshing = false;

// ══════════════════════════════════════════════════
//  DOM refs
// ══════════════════════════════════════════════════

const $ = id => document.getElementById(id);
const fundCode = $('fundCode');
const costPrice = $('costPrice');
const shares = $('shares');
const addBtn = $('addBtn');
const fundList = $('fundList');
const fundTable = $('fundTable');
const emptyMsg = $('emptyMsg');
const totalCost = $('totalCost');
const totalValue = $('totalValue');
const totalProfit = $('totalProfit');
const totalProfitPercent = $('totalProfitPercent');
const totalDayProfit = $('totalDayProfit');
const totalDayPercent = $('totalDayPercent');
const lastUpdate = $('lastUpdate');
const autoRefresh = $('autoRefresh');
const refreshBtn = $('refreshBtn');
const clearAllBtn = $('clearAllBtn');
const refreshInfo = $('refreshInfo');
const totalFunds = $('totalFunds');
const fundCount = $('fundCount');
const statusDot = $('statusDot');
const statusText = $('statusText');
const costHintToggle = $('costHintToggle');

let useTotalCostMode = false;  // true: 成本总额+份额 → 反算单价

// ══════════════════════════════════════════════════
//  Load / Save
// ══════════════════════════════════════════════════

async function loadPortfolio() {
  // 先从服务端按 IP 加载
  try {
    const resp = await fetch('/api/portfolio');
    if (resp.ok) {
      const data = await resp.json();
      if (data.portfolio && data.portfolio.length) {
        portfolio = data.portfolio;
        // 兼容旧数据
        portfolio.forEach(p => {
          if (p.totalCost === undefined) p.totalCost = p.costPrice * p.shares;
        });
        // 同步到 localStorage 作为本地缓存
        localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolio));
        return;
      }
    }
  } catch (e) {
    console.log('服务端加载失败，尝试 localStorage', e.message);
  }
  // 回退到 localStorage
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) portfolio = JSON.parse(raw);
  } catch (e) { portfolio = []; }
  portfolio.forEach(p => {
    if (p.totalCost === undefined) p.totalCost = p.costPrice * p.shares;
  });
}

function savePortfolio() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(portfolio));
  // 异步保存到服务端（不阻塞 UI）
  fetch('/api/portfolio', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ portfolio })
  }).catch(e => console.log('服务端保存失败', e.message));
  updateFundCount();
}

// ══════════════════════════════════════════════════
//  API calls
// ══════════════════════════════════════════════════

async function fetchQuote(code) {
  const resp = await fetch(`/api/quote/${code}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function fetchQuotesBatch(codes) {
  if (!codes.length) return [];
  const resp = await fetch(`/api/quotes`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ codes })
  });
  const data = await resp.json();
  return data.results || [];
}

async function fetchFundInfo(code) {
  const resp = await fetch(`/api/fund/${code}`);
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

// ══════════════════════════════════════════════════
//  Core refresh
// ══════════════════════════════════════════════════

async function refreshAllQuotes() {
  if (isRefreshing) return;
  if (!portfolio.length) {
    updateStatus('idle');
    return;
  }

  isRefreshing = true;
  statusDot.classList.remove('on', 'off');
  statusDot.classList.add('loading');
  statusText.textContent = '刷新中…';

  try {
    const codes = portfolio.map(p => p.code);
    const results = await fetchQuotesBatch(codes);

    results.forEach((q) => {
      if (q && q.code && q.price > 0) {
        quotes[q.code] = {
          name: q.name || quotes[q.code]?.name || q.code,
          price: q.price,
          prevClose: q.prevClose,
          change: q.change,
          changePercent: q.changePercent,
          time: q.time,
          source: q.source
        };
      }
    });

    // 对没有返回结果的，尝试逐个获取
    for (const p of portfolio) {
      if (!quotes[p.code] || !quotes[p.code].price) {
        try {
          const q = await fetchQuote(p.code);
          if (q && q.price > 0) {
            quotes[q.code] = {
              name: q.name || quotes[q.code]?.name || q.code,
              price: q.price,
              prevClose: q.prevClose,
              change: q.change,
              changePercent: q.changePercent,
              time: q.time,
              source: q.source
            };
          }
        } catch (e) {
          console.warn(`Failed to fetch ${p.code}:`, e);
        }
      }
    }

    renderTable();
    renderSummary();
    updateStatus('ok');
    lastUpdate.textContent = `⏱ ${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
    refreshInfo.textContent = `⏱ 已更新 · ${portfolio.length} 只基金`;
  } catch (err) {
    console.error('Refresh failed:', err);
    updateStatus('error', err.message);
    refreshInfo.textContent = '⏱ 更新失败，5秒后重试…';
  } finally {
    isRefreshing = false;
  }
}

// ══════════════════════════════════════════════════
//  Render
// ══════════════════════════════════════════════════

function renderTable() {
  if (!portfolio.length) {
    fundTable.style.display = 'none';
    emptyMsg.style.display = 'block';
    return;
  }

  fundTable.style.display = '';
  emptyMsg.style.display = 'none';

  const rows = portfolio.map(p => {
    const q = quotes[p.code];
    const currentPrice = q?.price || 0;
    const prevClose = q?.prevClose || 0;
    const dayChange = q?.changePercent ?? null;
    const name = q?.name || p.code;

    const costTotal = Number(p.totalCost) || (p.costPrice * p.shares);
    const currentTotal = currentPrice * p.shares;
    const profit = currentTotal - costTotal;
    const profitPct = costTotal > 0 ? (profit / costTotal) * 100 : 0;

    // 今日收益 = (当前价 - 昨收) * 份额
    const dayProfit = prevClose > 0 ? (currentPrice - prevClose) * p.shares : 0;
    const dayPct = prevClose > 0 ? ((currentPrice - prevClose) / prevClose) * 100 : 0;

    const profitCls = profit > 0 ? 'positive' : profit < 0 ? 'negative' : '';
    const dayCls = dayProfit > 0 ? 'positive' : dayProfit < 0 ? 'negative' : '';
    const dayChangeCls = dayChange > 0 ? 'positive' : dayChange < 0 ? 'negative' : '';

    return `
      <tr>
        <td>
          <span class="code-tag">${p.code}</span>
          <span class="name-cell" title="${escapeHtml(name)}">${escapeHtml(name)}</span>
        </td>
        <td class="num">¥${fmt(costTotal / p.shares, 4)}</td>
        <td class="num">${fmt(p.shares, 2)}</td>
        <td class="num">¥${fmt(costTotal, 2)}</td>
        <td class="num">¥${fmt(currentPrice, 4)}</td>
        <td class="num ${dayChangeCls}">${dayChange !== null ? (dayChange >= 0 ? '+' : '') + dayChange.toFixed(2) + '%' : '—'}</td>
        <td class="num ${profitCls}">${profit >= 0 ? '+' : ''}¥${fmt(profit, 2)}</td>
        <td class="num ${profitCls}">${profit >= 0 ? '+' : ''}${profitPct.toFixed(2)}%</td>
        <td class="num ${dayCls}">${dayProfit >= 0 ? '+' : ''}¥${fmt(dayProfit, 2)}</td>
        <td><button class="remove-btn" data-id="${p.id}" title="删除">✕</button></td>
      </tr>
    `;
  });

  fundList.innerHTML = rows.join('');

  // 删除事件
  fundList.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', () => removeFund(btn.dataset.id));
  });
}

function renderSummary() {
  if (!portfolio.length) {
    totalCost.textContent = '¥0.00';
    totalValue.textContent = '¥0.00';
    totalProfit.textContent = '¥0.00';
    totalProfitPercent.textContent = '—';
    totalDayProfit.textContent = '¥0.00';
    totalDayPercent.textContent = '—';
    return;
  }

  let sumCost = 0;
  let sumValue = 0;
  let sumDayProfit = 0;
  let sumPrevValue = 0; // 昨收总市值

  portfolio.forEach(p => {
    const q = quotes[p.code];
    const cost = Number(p.totalCost) || (p.costPrice * p.shares);
    const currPrice = q?.price || 0;
    const prevClose = q?.prevClose || 0;

    sumCost += cost;
    sumValue += currPrice * p.shares;
    sumPrevValue += prevClose * p.shares;
  });

  const totalP = sumValue - sumCost;
  const totalPct = sumCost > 0 ? (totalP / sumCost) * 100 : 0;
  const totalDayP = sumValue - sumPrevValue;
  const totalDayPct = sumPrevValue > 0 ? (totalDayP / sumPrevValue) * 100 : 0;

  setSummaryValue(totalCost, totalP >= 0 && totalP !== 0 ? 'positive' : totalP < 0 ? 'negative' : 'neutral', `¥${fmt(sumCost, 2)}`);
  setSummaryValue(totalValue, 'neutral', `¥${fmt(sumValue, 2)}`);
  setSummaryValue(totalProfit, totalP > 0 ? 'positive' : totalP < 0 ? 'negative' : 'neutral', `${totalP >= 0 ? '+' : ''}¥${fmt(totalP, 2)}`);
  totalProfitPercent.textContent = `${totalP >= 0 ? '+' : ''}${totalPct.toFixed(2)}%`;
  totalProfitPercent.style.color = totalP > 0 ? '#ff4444' : totalP < 0 ? '#00ba7c' : '#8899a6';

  setSummaryValue(totalDayProfit, totalDayP > 0 ? 'positive' : totalDayP < 0 ? 'negative' : 'neutral', `${totalDayP >= 0 ? '+' : ''}¥${fmt(totalDayP, 2)}`);
  totalDayPercent.textContent = `${totalDayP >= 0 ? '+' : ''}${totalDayPct.toFixed(2)}%`;
  totalDayPercent.style.color = totalDayP > 0 ? '#ff4444' : totalDayP < 0 ? '#00ba7c' : '#8899a6';
}

function setSummaryValue(el, cls, text) {
  el.className = `value ${cls}`;
  el.textContent = text;
}

function updateFundCount() {
  const n = portfolio.length;
  totalFunds.textContent = n;
  fundCount.textContent = `${n} 只基金`;
}

function updateStatus(state, msg) {
  const states = ['on', 'off', 'loading'];
  statusDot.classList.remove(...states);
  switch (state) {
    case 'ok':
      statusDot.classList.add('on');
      statusText.textContent = '已连接 · 数据正常';
      break;
    case 'error':
      statusDot.classList.add('off');
      statusText.textContent = `错误: ${msg || '获取数据失败'}`;
      break;
    case 'idle':
      statusDot.classList.add('on');
      statusText.textContent = '就绪 · 等待添加基金';
      break;
    default:
      statusDot.classList.add('loading');
      statusText.textContent = msg || '…';
  }
}

// ══════════════════════════════════════════════════
//  Portfolio management
// ══════════════════════════════════════════════════

function addFund(code, costPriceVal, sharesVal) {
  code = code.trim();
  if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
    alert('请输入6位基金代码');
    return;
  }
  if (!sharesVal || sharesVal <= 0) {
    alert('请输入有效的持有份额');
    return;
  }
  if (!costPriceVal || costPriceVal <= 0) {
    alert('请输入有效的成本单价');
    return;
  }

  // 检查是否重复
  if (portfolio.some(p => p.code === code)) {
    alert(`基金 ${code} 已在列表中`);
    return;
  }

  const totalCostVal = costPriceVal * sharesVal;

  const item = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    code,
    costPrice: costPriceVal,
    shares: sharesVal,
    totalCost: totalCostVal
  };

  portfolio.push(item);
  savePortfolio();

  // 立即获取行情
  fetchQuote(code).then(q => {
    if (q && q.price > 0) {
      quotes[q.code] = {
        name: q.name || quotes[q.code]?.name || q.code,
        price: q.price,
        prevClose: q.prevClose,
        change: q.change,
        changePercent: q.changePercent,
        time: q.time,
        source: q.source
      };
    }
    renderTable();
    renderSummary();
  }).catch(() => {
    // 即使获取失败也渲染（显示未知名称）
    renderTable();
    renderSummary();
  });

  renderTable();
  renderSummary();
  clearForm();
  showMain();
}

function removeFund(id) {
  portfolio = portfolio.filter(p => p.id !== id);
  savePortfolio();
  renderTable();
  renderSummary();
}

function clearAll() {
  if (!portfolio.length) return;
  if (!confirm('确定清空所有基金？')) return;
  portfolio = [];
  quotes = {};
  savePortfolio();
  renderTable();
  renderSummary();
  updateStatus('idle');
}

function clearForm() {
  fundCode.value = '';
  costPrice.value = '';
  shares.value = '';
  fundCode.focus();
}

// ══════════════════════════════════════════════════
//  Page Switching
// ══════════════════════════════════════════════════

function showMain() {
  document.getElementById('pageMain').classList.remove('hidden');
  document.getElementById('pageAdd').classList.remove('active');
  document.getElementById('fabBtn').classList.remove('hidden');
}

function showAdd() {
  document.getElementById('pageMain').classList.add('hidden');
  document.getElementById('pageAdd').classList.add('active');
  document.getElementById('fabBtn').classList.add('hidden');
}

// ══════════════════════════════════════════════════
//  Helpers
// ══════════════════════════════════════════════════

function fmt(num, decimals) {
  if (num === undefined || num === null || isNaN(num)) return '0'.padEnd(decimals + 2, '0');
  return Number(num.toFixed(decimals)).toLocaleString('zh-CN', {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals
  });
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ══════════════════════════════════════════════════
//  Events
// ══════════════════════════════════════════════════

addBtn.addEventListener('click', () => {
  const code = fundCode.value.trim();
  const price = parseFloat(costPrice.value);
  const sharesVal = parseFloat(shares.value);

  if (useTotalCostMode) {
    // 总金额模式：份额 + 总金额 → 反算单价
    const totalCostVal = parseFloat(costPrice.value); // 此时 costPrice 输入框用于输入总金额
    if (totalCostVal > 0 && sharesVal > 0) {
      const derivedPrice = totalCostVal / sharesVal;
      addFund(code, derivedPrice, sharesVal);
    } else {
      alert('请输入总金额和份额');
    }
  } else {
    addFund(code, price, sharesVal);
  }
});

// ─── 页面切换事件 ───
document.getElementById('fabBtn').addEventListener('click', showAdd);
document.getElementById('addFundBtn').addEventListener('click', showAdd);
document.getElementById('backBtn').addEventListener('click', showMain);

// Enter 键提交
[fundCode, costPrice, shares].forEach(el => {
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter') addBtn.click();
  });
});

// 切换输入模式
let modeToggleCount = 0;
costHintToggle.addEventListener('click', () => {
  useTotalCostMode = !useTotalCostMode;
  if (useTotalCostMode) {
    costPrice.placeholder = '总投入金额 (元)';
    document.querySelector('.form-group.price label').textContent = '总投入金额 (元)';
    costHintToggle.textContent = '切换到成本单价输入';
  } else {
    costPrice.placeholder = '0.000';
    document.querySelector('.form-group.price label').textContent = '成本单价 (元)';
    costHintToggle.textContent = '切换到总金额输入';
  }
  costPrice.value = '';
});

// 自动刷新
autoRefresh.addEventListener('change', () => {
  if (autoRefresh.checked) startAutoRefresh();
  else stopAutoRefresh();
});

refreshBtn.addEventListener('click', () => refreshAllQuotes());
clearAllBtn.addEventListener('click', clearAll);

// ══════════════════════════════════════════════════
//  Auto refresh
// ══════════════════════════════════════════════════

function startAutoRefresh() {
  stopAutoRefresh();
  refreshTimer = setInterval(refreshAllQuotes, 5000);
}

function stopAutoRefresh() {
  if (refreshTimer) {
    clearInterval(refreshTimer);
    refreshTimer = null;
  }
}

// ══════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════

async function init() {
  await loadPortfolio();

  if (portfolio.length) {
    updateStatus('loading', '正在获取首屏数据…');
    await refreshAllQuotes();
  } else {
    updateStatus('idle');
    renderTable();
    renderSummary();
  }

  if (autoRefresh.checked) startAutoRefresh();

  // 演示数据（URL ?demo=1）
  if (window.location.search.includes('demo=1') && portfolio.length === 0) {
    const demoFunds = [
      { code: '159625', costPrice: 1.050, shares: 20000 },
      { code: '510050', costPrice: 2.550, shares: 10000 },
      { code: '110011', costPrice: 2.180, shares: 5000 },
    ];
    for (const f of demoFunds) {
      portfolio.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        ...f,
        totalCost: f.costPrice * f.shares
      });
    }
    savePortfolio();
    await refreshAllQuotes();
  }
}

init();
</script>
